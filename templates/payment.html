<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Payment</title>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card shadow p-4">

<h3>Salary Payment</h3>

<hr>

<p><strong>Worker:</strong> {{ worker_name }}</p>

<p><strong>Virtual Salary:</strong> ₹{{ amount }}</p>

<button id="pay-btn" class="btn btn-success">

Pay with Razorpay

</button>

</div>

</div>

<script>

var options = {

key: "{{ razorpay_key }}",

amount: "{{ order['amount'] }}",

currency: "{{ order['currency'] }}",

name: "Gig Worker Income Smoothing",

description: "Virtual Salary Payment",

order_id: "{{ order['id'] }}",

handler: function (response) {

window.location =
"/payment_success?payment_id=" +
response.razorpay_payment_id +
"&order_id=" +
response.razorpay_order_id;

}

};

var rzp = new Razorpay(options);

document.getElementById("pay-btn").onclick = function(e){

rzp.open();

e.preventDefault();

};

</script>

</body>

</html>
